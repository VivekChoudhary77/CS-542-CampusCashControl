services:
  - type: web
    name: campuscashcontrol-api
    env: python
    rootDir: campuscashcontrolb
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: gunicorn CampusCashControl.wsgi:application
    plan: free
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "False"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-amplify-domain.amplifyapp.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://your-amplify-domain.amplifyapp.com"
      - key: DATABASE_URL
        fromDatabase:
          name: campuscashcontrol-db
          property: connectionString

databases:
  - name: campuscashcontrol-db
    plan: free
