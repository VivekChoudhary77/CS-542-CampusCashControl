version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd campuscashcontrolf
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: campuscashcontrolf/dist
    files:
      - '**/*'
  cache:
    paths:
      - campuscashcontrolf/node_modules/**/*
